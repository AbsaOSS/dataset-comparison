name: CI Scala

on:
  pull_request:
    branches: [ master ]

env:
  coverage-overall: 80.0
  coverage-changed-files: 80.0
  coverage-per-changed-file: 0.0

jobs:
  detect:
    name: Scala Changes Detection
    runs-on: ubuntu-latest
    outputs:
      has_scala_changed: ${{ steps.changes.outputs.has_scala_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check if Scala files changed (excluding project/)
        id: changes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CHANGED_FILES=$(gh api \
              --paginate \
              "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
              --jq '.[].filename
                | select(endswith(".scala"))
                | select(startswith("project/") | not)')
          else
            CHANGED_FILES=$(git diff --name-only "${{ github.sha }}~1" "${{ github.sha }}" -- '**/*.scala' | grep -v '^project/' || true)
          fi

          if [[ -n "${CHANGED_FILES}" ]]; then
            echo "has_scala_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_scala_changed=false" >> "$GITHUB_OUTPUT"
          fi

  jacoco-report:
    name: JaCoCo Report
    needs: detect
    if: needs.detect.outputs.has_scala_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: bigfiles
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Scala
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: '8'

      - name: Build and run tests
        continue-on-error: true
        id: jacocorun
        run: sbt jacoco

      - name: Publish JaCoCo Report in PR comments
        uses: MoranaApps/jacoco-report@54bfe284d1119dc917dddba80517c54c5bcf3627
        with:
          token: '${{ secrets.GITHUB_TOKEN }}'
          paths: |
            bigfiles/target/**/jacoco/report/jacoco.xml
          sensitivity: "detail"
          comment-mode: 'single'
          min-coverage-overall: ${{ env.coverage-overall }}
          min-coverage-changed-files: ${{ env.coverage-changed-files }}
          min-coverage-per-changed-file: ${{ env.coverage-per-changed-file }}
          skip-unchanged: false

  format-check:
    name: Format Check
    needs: detect
    if: needs.detect.outputs.has_scala_changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bigfiles
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Scala
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: '8'

      - name: Run scalafmt And Print Diff
        continue-on-error: false
        run: sbt scalafmt scalafmtSbt && git diff --exit-code

  noop:
    name: No Operation
    needs: detect
    if: needs.detect.outputs.has_scala_changed != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No changes in the *.scala files (excluding project/) — passing."
